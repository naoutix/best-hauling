name: Mise à jour des routes UEX

on:
  schedule:
    - cron: "17 * * * *"   # toutes les heures (à HH:17, décalé pour éviter les pics)
  workflow_dispatch:         # bouton manuel dans l'onglet Actions
  push:
    branches: [ main ]
    paths:
      - "scripts/build-data.mjs"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Générer les données
        run: node scripts/build-data.mjs

      - name: Commit si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/routes.json data/ships.json data/meta.json
          if git diff --staged --quiet; then
            echo "Aucun changement de données."
          else
            git commit -m "chore: mise à jour des routes UEX [skip ci]"
            git push
          fi
