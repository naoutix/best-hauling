name: Mise à jour des routes UEX

on:
  schedule:
    - cron: "17,47 * * * *" # toutes les 30 min (à HH:17 / HH:47) — plancher de fraîcheur UEX (~30 min)
  workflow_dispatch:         # bouton manuel dans l'onglet Actions
  push:
    branches: [ main ]       # redéploie le site à chaque changement de code

# Le site (données fraîches incluses) est publié via l'artefact GitHub Pages —
# la CI ne RE-commite jamais les JSON reconstruits (pas de bruit dans l'historique).
# Les data/*.json versionnés sont un INSTANTANÉ de démarrage : ils font tourner `npm run serve`
# et une nouvelle clone hors-ligne sans rejouer un build contre l'API UEX (cf. README « Données »).
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

# Ne pas annuler un déploiement en cours (recommandé pour Pages).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Exposé au job deploy : "true" seulement si les données UEX ont changé (ou build forcé).
    outputs:
      changed: ${{ steps.build.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20

      - name: Tests
        run: node --test

      # Rebuild conditionnel : le cron ne reconstruit que si UEX a changé (compare la signature
      # au meta.json déjà déployé). push / lancement manuel forcent la reconstruction (FORCE=1).
      - name: Générer les données
        id: build
        env:
          # meta.json du site déjà en ligne (URL Pages de ce dépôt) — sert de signature précédente.
          DEPLOYED_META_URL: https://naoutix.github.io/best-hauling/data/meta.json
          FORCE: ${{ github.event_name != 'schedule' && '1' || '' }}
        run: node scripts/build-data.mjs

      - name: Assembler le site
        if: steps.build.outputs.changed != 'false'
        run: |
          mkdir -p _site/data _site/fonts
          cp index.html app.js logic.mjs style.css manifest.webmanifest sw.js icon.svg _site/
          cp fonts/* _site/fonts/
          cp data/*.json _site/data/

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5
        if: steps.build.outputs.changed != 'false'

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        if: steps.build.outputs.changed != 'false'
        with:
          path: _site

  deploy:
    needs: build
    if: needs.build.outputs.changed != 'false'  # rien à déployer si les données n'ont pas changé
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4

  # Ouvre une issue si le build/déploiement échoue, la referme au retour à la normale.
  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        with:
          script: |
            const failed =
              ["failure", "cancelled"].includes(process.env.BUILD_RESULT) ||
              ["failure", "cancelled"].includes(process.env.DEPLOY_RESULT);
            const { owner, repo } = context.repo;
            const title = "⚠️ Échec de la mise à jour des données UEX";
            const open = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "ci-failure",
            });
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            if (failed) {
              const body = `Le workflow a échoué (build: ${process.env.BUILD_RESULT}, deploy: ${process.env.DEPLOY_RESULT}).\n\nRun : ${runUrl}\n\n_Message automatique — cette issue se refermera au prochain succès._`;
              if (open.data.length) {
                await github.rest.issues.createComment({ owner, repo, issue_number: open.data[0].number, body });
              } else {
                await github.rest.issues.create({ owner, repo, title, body, labels: ["ci-failure"] });
              }
            } else {
              for (const issue of open.data) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `✅ Rétabli — le workflow a de nouveau réussi (${runUrl}).`,
                });
                await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: "closed" });
              }
            }
